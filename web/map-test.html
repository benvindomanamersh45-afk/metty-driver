<!DOCTYPE html>
<html>
<head>
    <title>Teste do Google Maps</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBADLb8JYCAH_PiMaCZmyswQKNLUD3px1U"></script>
    <style>
        #map {
            height: 400px;
            width: 100%;
        }
    </style>
</head>
<body>
    <h3>Teste do Google Maps</h3>
    <div id="map"></div>
    
    <script>
        function initMap() {
            // Coordenadas de Luanda
            var luanda = {lat: -8.8390, lng: 13.2894};
            var map = new google.maps.Map(document.getElementById('map'), {
                zoom: 12,
                center: luanda
            });
            var marker = new google.maps.Marker({
                position: luanda,
                map: map
            });
        }
        
        window.onload = initMap;
    </script>
</body>
</html>
